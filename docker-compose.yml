x-whisper-volumes: &whisper-volumes
  - type: bind
    source: ./state
    target: /state
  - type: bind
    source: ./models
    target: /root/.cache/whisper
  - type: bind
    source: ./output_overall
    target: /overall-output

x-whisper-environment: &whisper-environment
  SOURCE_DIRS: ${SOURCE_DIRS:-}
  OUTPUT_DIRS: ${OUTPUT_DIRS:-}
  INPUT_OUTPUT_PAIRS: ${INPUT_OUTPUT_PAIRS:-}
  INPUT_DIR: ${INPUT_DIR:-/input}
  PROJECT_OUTPUT_DIR: ${PROJECT_OUTPUT_DIR:-/project-output}
  STATE_DIR: /state
  WHISPER_MODEL: ${WHISPER_MODEL:-base}
  WHISPER_OUTPUT_FORMAT: ${WHISPER_OUTPUT_FORMAT:-all}
  WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
  WHISPER_TASK: ${WHISPER_TASK:-transcribe}
  WHISPER_DOWNLOAD_DEVICE: ${WHISPER_DOWNLOAD_DEVICE:-cpu}
  WHISPER_CONDITION_ON_PREVIOUS_TEXT: ${WHISPER_CONDITION_ON_PREVIOUS_TEXT:-false}
  WHISPER_VERBOSE: ${WHISPER_VERBOSE:-true}
  FINGERPRINT_MODE: ${FINGERPRINT_MODE:-metadata}
  LOCAL_STAGING: ${LOCAL_STAGING:-false}
  LOCAL_STAGING_DIR: ${LOCAL_STAGING_DIR:-/tmp/auto-whisper-staging}
  OVERALL_OUTPUT_ENABLED: ${OVERALL_OUTPUT_ENABLED:-true}
  OVERALL_OUTPUT_DIR: ${OVERALL_OUTPUT_DIR:-/overall-output}
  SAFE_OUTPUT_FILENAMES: ${SAFE_OUTPUT_FILENAMES:-auto}
  SUPPORTED_EXTENSIONS: ${SUPPORTED_EXTENSIONS:-.mp3,.wav,.m4a,.flac,.ogg,.aac,.wma,.mp4,.m4v,.mov,.mkv,.webm,.avi,.wmv,.flv,.ts,.mts,.m2ts,.3gp,.3g2,.mpg,.mpeg,.vob,.ogv}

services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: auto-whisper:cpu
    volumes: *whisper-volumes
    environment:
      <<: *whisper-environment
      WHISPER_DEVICE: cpu
      WHISPER_FP16: "false"
    stdin_open: true
    tty: true

  diarization-cuda:
    profiles: ["diarization"]
    build:
      context: .
      dockerfile: Dockerfile.diarization
    image: auto-whisper:diarization-cuda
    gpus: all
    volumes:
      - type: bind
        source: .
        target: /app
      - type: bind
        source: ./output
        target: /app/output
      - type: bind
        source: ./output_overall
        target: /app/output_overall
      - type: bind
        source: ./output_pyannote
        target: /app/output_pyannote
      - type: bind
        source: ./output_pyannote_overall
        target: /app/output_pyannote_overall
      - type: bind
        source: ./state
        target: /app/state
      - type: bind
        source: ./.cache/huggingface
        target: /cache/huggingface
      - type: bind
        source: ./.cache/torch
        target: /cache/torch
    environment:
      PYANNOTE_AUTH_TOKEN: ${PYANNOTE_AUTH_TOKEN:-}
      PYANNOTE_METRICS_ENABLED: ${PYANNOTE_METRICS_ENABLED:-0}
      DIARIZATION_BACKEND: ${DIARIZATION_BACKEND:-pyannote}
      DIARIZATION_MODEL: ${DIARIZATION_MODEL:-pyannote/speaker-diarization-community-1}
      DIARIZATION_VERBOSE: ${DIARIZATION_VERBOSE:-false}
      DIARIZATION_PROGRESS: ${DIARIZATION_PROGRESS:-}
      DIARIZATION_TF32: ${DIARIZATION_TF32:-false}
      DIARIZATION_OOM_FALLBACK: ${DIARIZATION_OOM_FALLBACK:-cpu}
      DIARIZATION_AUDIO_PREPROCESS: ${DIARIZATION_AUDIO_PREPROCESS:-auto}
      DIARIZATION_AUDIO_PREPROCESS_DIR: ${DIARIZATION_AUDIO_PREPROCESS_DIR:-/tmp/auto-whisper-diarization}
      SAFE_OUTPUT_FILENAMES: ${SAFE_OUTPUT_FILENAMES:-auto}
      DIARIZATION_MIN_OVERLAP_RATIO: ${DIARIZATION_MIN_OVERLAP_RATIO:-0.3}
      DIARIZATION_NUM_SPEAKERS: ${DIARIZATION_NUM_SPEAKERS:-}
      DIARIZATION_MIN_SPEAKERS: ${DIARIZATION_MIN_SPEAKERS:-}
      DIARIZATION_MAX_SPEAKERS: ${DIARIZATION_MAX_SPEAKERS:-}
      DIARIZATION_CACHE_DIR: ${DIARIZATION_CACHE_DIR:-/app/state/diarization-cache}
      HF_HOME: ${HF_HOME:-/cache/huggingface}
      TORCH_HOME: ${TORCH_HOME:-/cache/torch}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    working_dir: /app
    command: >
      python scripts/backfill_diarization.py
      --transcripts-dir ./output
      --output-dir ./output_pyannote
      --overall-transcripts-dir ./output_overall
      --overall-output-dir ./output_pyannote_overall
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  whisper-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: auto-whisper:cuda
    volumes: *whisper-volumes
    environment:
      <<: *whisper-environment
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      WHISPER_FP16: ${WHISPER_FP16:-auto}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
